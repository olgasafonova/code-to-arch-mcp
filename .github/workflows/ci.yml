name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Verify dependencies
        run: go mod verify

      - name: Check go.mod/go.sum integrity
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not up to date. Run 'go mod tidy' and commit the changes."
            exit 1
          fi

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities (see above). Stdlib issues resolve with Go patch updates."

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          # Exclusions mirror .golangci.yml (G101, G104, G115, G204, G301, G304, G306)
          gosec -exclude=G101,G104,G115,G204,G301,G304,G306 -exclude-dir=tests ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -failfast -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build:
    needs: test
    # go-tree-sitter needs cgo, which defeats cross-compilation from a single
    # runner. Each matrix entry runs on a native OS so cgo uses the host
    # toolchain. linux/arm64 is dropped: no free native arm64 runner, and
    # setting up qemu cross-build here would outweigh the value (users on
    # linux/arm64 can build from source).
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        shell: bash
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o code-to-arch-${GOOS}-${GOARCH}${ext} ./cmd/code-to-arch

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: code-to-arch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: code-to-arch-*

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
